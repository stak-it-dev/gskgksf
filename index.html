<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN DELUXE | Premium Mini App</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Базовые настройки для исключения черного экрана */
        :root {
            --bg: #020617;
            --surface: #0b1121;
            --gold: #c5a059;
            --white: #ffffff;
            --text-muted: #94a3b8;
            --serif: 'Cormorant Garamond', serif;
            --sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--sans);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { padding: 0 20px; }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--serif); font-size: 22px; letter-spacing: 2px; }
        .logo span { color: var(--gold); }
        .cart-status { color: var(--gold); font-size: 12px; font-weight: 600; cursor: pointer; }

        /* HERO */
        .hero {
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                        url('https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=800') center/cover;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hero h1 { font-family: var(--serif); font-size: 36px; line-height: 1.1; margin-bottom: 10px; }
        .hero p { color: var(--text-muted); font-size: 14px; max-width: 280px; margin: 0 auto; font-weight: 300; }

        /* CATEGORIES */
        .category-nav {
            background: var(--bg);
            position: sticky; top: 57px; z-index: 90;
            padding: 15px 0;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        .category-list { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
        .category-list::-webkit-scrollbar { display: none; }
        .cat-tab {
            white-space: nowrap; font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted); cursor: pointer;
        }
        .cat-tab.active { color: var(--gold); font-weight: 600; border-bottom: 1px solid var(--gold); }

        /* CATALOG */
        .catalog { padding: 20px 0 120px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 12px;
            display: flex; flex-direction: column;
            border-radius: 8px;
            transition: 0.3s;
        }
        .p-img { width: 100%; aspect-ratio: 1/1; background: #070b14; border-radius: 4px; object-fit: cover; margin-bottom: 10px; }
        .p-name { font-family: var(--serif); font-size: 15px; height: 36px; overflow: hidden; line-height: 1.2; margin-bottom: 8px; }
        .p-price { color: var(--gold); font-weight: 600; font-size: 16px; margin-bottom: 10px; }
        .btn-add {
            width: 100%; background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px; font-size: 10px; font-weight: 600;
            text-transform: uppercase; border-radius: 4px; cursor: pointer;
        }
        .btn-add:active { background: var(--gold); color: var(--bg); }

        /* CART DRAWER */
        .cart-drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh;
            background: var(--bg); z-index: 1000; border-top: 1px solid var(--gold);
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 30px 20px; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column;
        }
        .cart-drawer.active { bottom: 0; }
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 900; display: none;
        }
        .cart-overlay.active { display: block; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .remove-btn { background: none; border: none; color: #ff4d4d; font-size: 20px; }

        /* CHECKOUT MODAL */
        .checkout-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none;
            padding: 40px 20px; flex-direction: column;
        }
        .checkout-modal.active { display: flex; }
        .checkout-modal h2 { font-family: var(--serif); font-size: 28px; margin-bottom: 20px; }
        input, textarea {
            width: 100%; padding: 15px; background: #161e2e; border: 1px solid rgba(255,255,255,0.1);
            color: white; margin-bottom: 15px; border-radius: 8px; font-family: var(--sans);
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-inner">
            <div class="logo">OCEAN<span>DELUXE</span></div>
            <div class="cart-status" onclick="toggleCart(true)">КОРЗИНА (<span id="cart-count">0</span>)</div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Искусство <br>морской свежести</h1>
            <p>Премиальные морепродукты шоковой заморозки (-60°C)</p>
        </div>
    </section>

    <div class="category-nav">
        <div class="category-list" id="category-tabs"></div>
    </div>

    <main class="catalog">
        <div class="container">
            <div class="product-grid" id="product-grid"></div>
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 class="serif">Заказ</h2>
            <button onclick="toggleCart(false)" style="background:none; border:none; color:var(--gold);">Закрыть</button>
        </div>
        <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding-top:20px; border-top:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-size:18px;">
                <span>Итого:</span>
                <span id="cart-total" style="color:var(--gold); font-weight:700;">0 ₽</span>
            </div>
        </div>
    </div>

    <div class="checkout-modal" id="checkout-modal">
        <h2 class="serif">Оформление</h2>
        <input type="text" id="name" placeholder="Ваше имя">
        <input type="tel" id="phone" placeholder="Телефон">
        <input type="text" id="address" placeholder="Адрес доставки">
        <textarea id="comment" placeholder="Комментарий (подъезд, этаж)"></textarea>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ПОЛНЫЙ КАТАЛОГ (36 товаров)
        const PRODUCTS = [
            { id: 1, cat: "Рыба", name: "Тунец Вьетнам стейк", price: 490, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=300" },
            { id: 2, cat: "Рыба", name: "Форель Карелия стейк", price: 1190, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" },
            { id: 3, cat: "Рыба", name: "Семга Чили стейк", price: 1750, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=300" },
            { id: 4, cat: "Рыба", name: "Дорадо Турция 400+", price: 1030, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=300" },
            { id: 5, cat: "Рыба", name: "Сибас Турция 400+", price: 1050, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" },
            { id: 6, cat: "Рыба", name: "Скумбрия Атлантика", price: 630, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=300" },
            { id: 7, cat: "Рыба", name: "Форель Карелия 2-3кг", price: 1050, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=300" },
            { id: 8, cat: "Рыба", name: "Морская Форель 2-3кг", price: 1200, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" },
            { id: 9, cat: "Морепродукты", name: "Креветка Королевская", price: 790, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=300" },
            { id: 10, cat: "Морепродукты", name: "Филе кальмара 1кг", price: 790, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 11, cat: "Морепродукты", name: "Морской коктейль", price: 430, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=300" },
            { id: 12, cat: "Морепродукты", name: "Креветка Арктида", price: 1196, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 13, cat: "Морепродукты", name: "Мясо мидий 1кг", price: 351, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=300" },
            { id: 14, cat: "Морепродукты", name: "Ваннамей 2кг", price: 1690, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 15, cat: "Морепродукты", name: "Северная креветка", price: 1650, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=300" },
            { id: 16, cat: "Морепродукты", name: "Мясо краба 500г", price: 2200, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 17, cat: "Икра", name: "Икра форели 250г", price: 1690, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 18, cat: "Икра", name: "Икра кеты 200г", price: 1430, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 19, cat: "Филе/Фарш", name: "Тилапия филе", price: 496, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" },
            { id: 20, cat: "Филе/Фарш", name: "Фарш горбуши 400г", price: 209, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=300" },
            { id: 21, cat: "Филе/Фарш", name: "Фарш семги 400г", price: 403, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" },
            { id: 22, cat: "Филе/Фарш", name: "Лосось Трим С", price: 1910, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=300" },
            { id: 23, cat: "П/Ф", name: "Кольца кальмара", price: 690, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 24, cat: "П/Ф", name: "Котлеты из кальмара", price: 390, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=300" },
            { id: 25, cat: "Фастфуд", name: "Пицца Пепперони", price: 275, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=300" },
            { id: 26, cat: "Фастфуд", name: "Картофель фри", price: 931, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=300" },
            { id: 27, cat: "Овощи", name: "Мексиканская смесь", price: 260, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=300" },
            { id: 28, cat: "Овощи", name: "Брокколи 1кг", price: 290, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=300" },
            { id: 29, cat: "Масло", name: "Масло 82.5% 500г", price: 679, img: "https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?q=80&w=300" },
            { id: 30, cat: "Слабая соль", name: "Лосось кусок", price: 189, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=300" }
        ];

        let cart = [];
        let currentCat = "Все";

        function renderCategories() {
            const cats = ["Все", ...new Set(PRODUCTS.map(p => p.cat))];
            document.getElementById('category-tabs').innerHTML = cats.map(c => `
                <div class="cat-tab ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>
            `).join('');
        }

        function setCat(c) {
            currentCat = c;
            renderCategories();
            renderProducts();
            tg.HapticFeedback.selectionChanged();
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = currentCat === "Все" ? PRODUCTS : PRODUCTS.filter(p => p.cat === currentCat);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="p-img">
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price} ₽</div>
                    <button class="btn-add" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if (inCart) inCart.qty++; else cart.push({...p, qty: 1});
            tg.HapticFeedback.impactOccurred('light');
            updateCart();
        }

        function updateCart() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total + " ₽";

            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:600;">${i.name}</div>
                        <div style="font-size:12px; color:var(--gold);">${i.qty} x ${i.price} ₽</div>
                    </div>
                    <button class="remove-btn" onclick="remove(${i.id})">&times;</button>
                </div>
            `).join('');

            if (count > 0) {
                tg.MainButton.show();
                tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${total} ₽)`);
                tg.MainButton.onClick(handleMainButton);
            } else {
                tg.MainButton.hide();
            }
        }

        function remove(id) {
            cart = cart.filter(x => x.id !== id);
            updateCart();
        }

        function toggleCart(show) {
            document.getElementById('cart-drawer').classList.toggle('active', show);
            document.getElementById('cart-overlay').classList.toggle('active', show);
        }

        function handleMainButton() {
            if (document.getElementById('checkout-modal').classList.contains('active')) {
                sendOrder();
            } else {
                toggleCart(false);
                document.getElementById('checkout-modal').classList.add('active');
                tg.BackButton.show();
                tg.MainButton.setText("ПОДТВЕРДИТЬ ЗАКАЗ");
            }
        }

        tg.BackButton.onClick(() => {
            document.getElementById('checkout-modal').classList.remove('active');
            tg.BackButton.hide();
            updateCart();
        });

        function sendOrder() {
            const name = document.getElementById('name').value;
            if(!name) return tg.showAlert("Введите имя");
            
            tg.showConfirm("Отправить заказ?", (ok) => {
                if(ok) {
                    const data = {
                        customer: name,
                        items: cart,
                        total: cart.reduce((a, b) => a + (b.price * b.qty), 0)
                    };
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                }
            });
        }

        // Запуск
        renderCategories();
        renderProducts();
    </script>
</body>
</html>
